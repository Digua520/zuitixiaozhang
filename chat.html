<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>地瓜老大 · AI商业顾问</title>
<style>
:root {
  --lotso-fur: #C06080;
  --lotso-fur-deep: #A04868;
  --lotso-fur-light: #D4789B;
  --lotso-belly: #F0E0C8;
  --text: #3E1A2E;
  --vintage-cream: #FFF8EC;
}
* { margin:0; padding:0; box-sizing:border-box; }
body {
  font-family: 'PingFang SC', 'Microsoft YaHei', -apple-system, sans-serif;
  background: linear-gradient(175deg, #FFF8EC, #FDF0F4, #F8E0EA, #FFF8EC);
  height: 100vh; overflow: hidden;
}
.chat-container {
  max-width: 520px; margin: 0 auto;
  height: 100vh; display: flex; flex-direction: column;
  background: #fff; box-shadow: 0 0 60px rgba(160,72,104,0.1);
}
.chat-header {
  background: linear-gradient(135deg, var(--lotso-fur-deep), var(--lotso-fur));
  color: #fff; padding: 14px 18px;
  display: flex; align-items: center; gap: 10px;
  flex-shrink: 0;
}
.chat-header .back {
  color: #fff; text-decoration: none; font-size: 1.2rem;
  display: flex; align-items: center;
}
.chat-header h4 { font-size: 1rem; font-weight: 800; flex:1; }
.chat-body {
  flex: 1; overflow-y: auto; padding: 16px;
  display: flex; flex-direction: column; gap: 12px;
  background: linear-gradient(180deg, #FFF8EC, #FDF0F4);
}
.chat-msg {
  max-width: 85%; padding: 10px 14px;
  border-radius: 16px; font-size: 0.88rem;
  line-height: 1.6; word-break: break-word;
  animation: msgIn 0.3s ease-out;
}
.chat-msg.user {
  align-self: flex-end;
  background: linear-gradient(135deg, var(--lotso-fur), var(--lotso-fur-deep));
  color: #fff; border-bottom-right-radius: 4px;
}
.chat-msg.bot {
  align-self: flex-start;
  background: #fff; border: 1.5px solid #F8E0EA;
  border-bottom-left-radius: 4px; color: var(--text);
}
.chat-typing {
  align-self: flex-start; display: flex; gap: 4px;
  padding: 10px 14px; background: #fff; border-radius: 16px;
  border: 1.5px solid #F8E0EA;
}
.chat-typing span {
  width: 6px; height: 6px; border-radius: 50%;
  background: var(--lotso-fur-light);
  animation: dotBounce 1.2s infinite;
}
.chat-typing span:nth-child(2) { animation-delay: 0.2s; }
.chat-typing span:nth-child(3) { animation-delay: 0.4s; }
@keyframes dotBounce {
  0%,60%,100% { transform: translateY(0); opacity: 0.4; }
  30% { transform: translateY(-6px); opacity: 1; }
}
@keyframes msgIn { from { opacity: 0; transform: translateY(8px); } }
.chat-input-wrap {
  display: flex; gap: 8px; padding: 12px 14px;
  border-top: 1px solid #F8E0EA; background: #fff; flex-shrink: 0;
}
.chat-input-wrap input {
  flex: 1; border: 2px solid #F8E0EA;
  border-radius: 22px; padding: 10px 16px;
  font-size: 0.88rem; outline: none; font-family: inherit;
}
.chat-input-wrap input:focus { border-color: var(--lotso-fur-light); }
.chat-input-wrap button {
  width: 42px; height: 42px; border-radius: 50%; border: none;
  background: linear-gradient(135deg, var(--lotso-fur), var(--lotso-fur-deep));
  color: #fff; font-size: 1.1rem; cursor: pointer; flex-shrink: 0;
}
.chat-input-wrap button:disabled { opacity: 0.5; }
</style>
</head>
<body>
<div class="chat-container">
  <div class="chat-header">
    <a href="/" class="back">←</a>
    <h4>🧸 地瓜老大 · AI顾问</h4>
    <span style="font-size:0.75rem;opacity:0.7;">嘴替小张</span>
  </div>
  <div class="chat-body" id="chatBody">
    <div class="chat-msg bot">我是地瓜老大，嘴替小张的AI商业顾问。<br>商业问题、内容困惑、执行卡点——直接说。</div>
  </div>
  <div class="chat-input-wrap">
    <input type="text" id="chatInput" placeholder="输入问题..." maxlength="500">
    <button id="chatSend">➤</button>
  </div>
</div>
<script>
(function() {
  var TOKEN = 'cztei_lvHpBzwruU9uIkoY6F2hLCpzRABFXBYC80ouYmuWsssmeY1nMXzN9piYrk5hZUkM2';
  var BOT_ID = '7648684933334319130';
  var API_URL = 'https://api.coze.cn/v3/chat';
  var userId = localStorage.getItem('coze_uid');
  if (!userId) { userId = 'u_' + Date.now() + '_' + Math.random().toString(36).substr(2,9); localStorage.setItem('coze_uid', userId); }

  var bodyEl = document.getElementById('chatBody');
  var input = document.getElementById('chatInput');
  var sendBtn = document.getElementById('chatSend');
  var isLoading = false;

  function addMsg(text, role) {
    var div = document.createElement('div');
    div.className = 'chat-msg ' + role;
    div.textContent = text;
    bodyEl.appendChild(div);
    bodyEl.scrollTop = bodyEl.scrollHeight;
    return div;
  }

  function showTyping() {
    var div = document.createElement('div');
    div.className = 'chat-typing';
    div.id = 'typingIndicator';
    div.innerHTML = '<span></span><span></span><span></span>';
    bodyEl.appendChild(div);
    bodyEl.scrollTop = bodyEl.scrollHeight;
  }

  function hideTyping() {
    var el = document.getElementById('typingIndicator');
    if (el) el.remove();
  }

  async function send() {
    var text = input.value.trim();
    if (!text || isLoading) return;
    input.value = ''; isLoading = true; sendBtn.disabled = true;
    addMsg(text, 'user'); showTyping();

    try {
      var resp = await fetch(API_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + TOKEN },
        body: JSON.stringify({
          bot_id: BOT_ID, user_id: userId, stream: true, auto_save_history: true,
          additional_messages: [{ role: 'user', content: text, content_type: 'text' }]
        })
      });

      console.log('Coze status:', resp.status);

      if (!resp.ok) {
        var errText = '';
        try { var ed = await resp.json(); errText = ed.msg || ed.message || JSON.stringify(ed); } catch(e) { errText = await resp.text(); }
        console.error('Coze HTTP error:', errText);
        throw new Error(errText || 'HTTP ' + resp.status);
      }

      hideTyping();
      var botMsg = addMsg('', 'bot');
      var reader = resp.body.getReader();
      var decoder = new TextDecoder('utf-8');
      var buffer = '';
      var rawChunks = [];

      while (true) {
        var r = await reader.read();
        if (r.done) break;
        var chunk = decoder.decode(r.value, { stream: true });
        rawChunks.push(chunk);
        buffer += chunk;
        var lines = buffer.split('\n');
        buffer = lines.pop() || '';

        for (var i = 0; i < lines.length; i++) {
          var line = lines[i].trim();
          if (!line) continue;
          if (line.indexOf('event:') === 0) continue;
          if (line.indexOf('data:') !== 0) continue;

          var jsonStr = line.substring(5).trim();
          if (!jsonStr || jsonStr === '[DONE]') continue;

          try {
            var d = JSON.parse(jsonStr);
            // Coze API 业务错误：code 不为 0 表示失败
            if (d.code && d.code !== 0) {
              throw new Error(d.msg || d.message || ('Coze错误 code=' + d.code));
            }
            // Coze v3 返回多种格式，逐一尝试提取 content
            var content = d.content
              || (d.data && d.data.content)
              || (d.message && d.message.content)
              || (d.payload && d.payload.content)
              || '';
            if (content) {
              botMsg.textContent += content;
              bodyEl.scrollTop = bodyEl.scrollHeight;
            }
          } catch(e) {
            if (e.message && e.message.indexOf('Coze错误') === 0) throw e;
            console.log('SSE parse skip:', jsonStr.substring(0, 80));
          }
        }
      }

      if (!botMsg.textContent) {
        // 尝试从原始响应中检测 Coze 业务错误（非 SSE 格式的 JSON 错误）
        var raw = rawChunks.join('');
        try {
          var rawJson = JSON.parse(raw);
          if (rawJson.code && rawJson.code !== 0) {
            throw new Error(rawJson.msg || rawJson.message || ('Coze错误 code=' + rawJson.code));
          }
        } catch(e) {
          if (e.message && (e.message.indexOf('Coze错误') === 0 || e.message.indexOf('token') > -1 || e.message.indexOf('Bearer') > -1)) throw e;
        }
        console.log('No content extracted. Raw chunks:', raw.substring(0, 500));
        botMsg.textContent = '(未收到回复 · 查看浏览器控制台日志)';
      }
    } catch(e) {
      hideTyping();
      console.error('Chat error:', e.message);
      addMsg('出错：' + e.message, 'bot');
    }
    isLoading = false; sendBtn.disabled = false;
    input.focus(); bodyEl.scrollTop = bodyEl.scrollHeight;
  }

  sendBtn.addEventListener('click', send);
  input.addEventListener('keydown', function(e) {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); }
  });
})();
</script>
</body>
</html>
