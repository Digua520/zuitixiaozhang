<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>地瓜老大 · AI商业顾问</title>
<style>
:root {
  --lotso-fur: #C06080;
  --lotso-fur-deep: #A04868;
}
* { margin:0; padding:0; box-sizing:border-box; }
body {
  font-family: 'PingFang SC', 'Microsoft YaHei', -apple-system, sans-serif;
  background: linear-gradient(175deg, #FFF8EC, #FDF0F4, #F8E0EA, #FFF8EC);
  height: 100vh; overflow: hidden;
  display: flex; flex-direction: column;
}
.chat-header {
  background: linear-gradient(135deg, var(--lotso-fur-deep), var(--lotso-fur));
  color: #fff; padding: 12px 18px;
  display: flex; align-items: center; gap: 10px;
  flex-shrink: 0; z-index: 10;
}
.chat-header .back {
  color: #fff; text-decoration: none; font-size: 1.2rem;
  display: flex; align-items: center;
}
.chat-header h4 { font-size: 1rem; font-weight: 800; flex:1; }
#coze-chat {
  flex: 1;
  overflow: hidden;
}
</style>
</head>
<body>
<div class="chat-header">
  <a href="/" class="back">←</a>
  <h4>🧸 地瓜老大 · AI顾问</h4>
  <span style="font-size:0.75rem;opacity:0.7;">嘴替小张</span>
</div>
<div id="coze-chat" style="position:relative;">
  <div id="chat-loading" style="position:absolute;top:0;left:0;width:100%;height:100%;display:flex;align-items:center;justify-content:center;flex-direction:column;color:#A04868;font-size:0.9rem;">
    <div style="font-size:2rem;margin-bottom:8px;">🧸</div>
    <div>地瓜老大来了...</div>
  </div>
</div>
<div id="sdk-error" style="display:none;padding:20px;text-align:center;color:#A04868;"></div>

<script>
var chatEl = document.getElementById('coze-chat');
var errEl = document.getElementById('sdk-error');
var sdkLoaded = false;

// 5秒超时检测
setTimeout(function() {
  if (!sdkLoaded) {
    var loadingEl = document.getElementById('chat-loading');
    if (loadingEl) loadingEl.style.display = 'none';
    errEl.style.display = 'block';
    errEl.innerHTML = '<p style="font-size:1.2rem;">⚠️</p><p>聊天组件加载超时</p><p style="font-size:0.8rem;opacity:0.7;">请检查网络或刷新重试</p>';
  }
}, 5000);

function initChat() {
  try {
    sdkLoaded = true;
    var loadingEl = document.getElementById('chat-loading');
    if (loadingEl) loadingEl.style.display = 'none';
    errEl.style.display = 'none';
    new CozeWebSDK.WebChatClient({
      config: {
        bot_id: '7648684933334319130',
      },
      componentProps: {
        title: '地瓜老大',
      },
      auth: {
        type: 'token',
        token: 'cztei_lB0ZL5GNJh8wS6AXyGEVdzycxn1Bn0a3sz2S2IexozJt7t691Fghm9vIWC5QjHLoI',
        onRefreshToken: function () {
          return 'cztei_lB0ZL5GNJh8wS6AXyGEVdzycxn1Bn0a3sz2S2IexozJt7t691Fghm9vIWC5QjHLoI'
        }
      },
      ui: {
        asstBtn: { isNeed: false },
        chatBot: { el: chatEl },
        header: { isShow: false },
        footer: { isShow: false }
      }
    });
  } catch(e) {
    errEl.style.display = 'block';
    errEl.innerHTML = '<p>聊天组件初始化失败</p><p style="font-size:0.8rem;opacity:0.7;">' + e.message + '</p>';
  }
}
</script>
<script src="https://lf-cdn.coze.cn/obj/unpkg/flow-platform/chat-app-sdk/1.2.0-beta.19/libs/cn/index.js" onload="initChat()" onerror="var l=document.getElementById('chat-loading');if(l)l.style.display='none';errEl.style.display='block';errEl.innerHTML='<p>聊天组件加载失败</p><p style=font-size:0.8rem;opacity:0.7;>SDK CDN 不可达</p>'"></script>
</body>
</html>
